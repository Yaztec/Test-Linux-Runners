name: Linux DSC smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  dsc-linux-smoke:
    name: Run minimal DSC get on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Verify PowerShell
        shell: bash
        run: |
          which pwsh
          pwsh --version

      - name: Install and Verify DSC 3.2.1
        shell: bash
        run: |
          set -euo pipefail

          DSC_VERSION="3.2.1"
          DSC_DEB="dsc_${DSC_VERSION}-1_amd64.deb"
          DSC_URL="https://github.com/PowerShell/DSC/releases/download/v${DSC_VERSION}/${DSC_DEB}"

          curl -L "$DSC_URL" -o "$DSC_DEB"
          sudo dpkg -i "$DSC_DEB"

          dsc --version
          dsc --help | head -40

      - name: Run smoke controller
        shell: pwsh
        run: |
          ./Invoke-Smoke.ps1

      - name: Output smoke result file
        if: always()
        shell: bash
        run: |
          echo "----- dsc-smoke-output.txt -----"
          cat ./dsc-smoke-output.txt

      - name: Upload smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsc-linux-smoke-output
          path: ./dsc-smoke-output.txt
          retention-days: 2